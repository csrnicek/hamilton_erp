name: Sync Taskmaster

# Keeps .taskmaster/tasks/tasks.json (Task 25 subtasks) in sync with
# docs/task_25_checklist.md, the canonical source of truth.
#
# Two roles:
#
#   1. Pre-merge guard (pull_request) — fails CI if a PR modifies the
#      checklist or the Taskmaster JSON without keeping them in sync.
#      Forces the PR author to update both.
#
#   2. Post-merge auto-sync (push to main) — if the checklist changed
#      and the JSON didn't, opens a follow-up PR to re-derive Taskmaster
#      from the checklist. Defends against drift even when a PR sneaks
#      through without the JSON update.
#
# Source of truth: docs/task_25_checklist.md
# Mirror: .taskmaster/tasks/tasks.json (Task 25 subtasks)
# Convention documented in CLAUDE.md "Plugin Data Freshness".

on:
  pull_request:
    branches: [main]
    paths:
      - "docs/task_25_checklist.md"
      - ".taskmaster/tasks/tasks.json"
  push:
    branches: [main]
    paths:
      - "docs/task_25_checklist.md"

jobs:
  check-sync:
    if: github.event_name == 'pull_request'
    name: Verify Taskmaster matches checklist
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Verify sync
        run: |
          python3 .github/scripts/sync_taskmaster_from_checklist.py --check

  auto-sync:
    if: github.event_name == 'push'
    name: Auto-sync Taskmaster from checklist
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      TRIGGER_SHA: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Run sync
        id: sync
        run: |
          python3 .github/scripts/sync_taskmaster_from_checklist.py
          if git diff --quiet -- .taskmaster/tasks/tasks.json; then
            echo "drift=false" >> "$GITHUB_OUTPUT"
          else
            echo "drift=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Open sync PR
        if: steps.sync.outputs.drift == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          BRANCH="chore/auto-sync-taskmaster-$(date -u +%Y%m%d-%H%M%S)"
          git config user.name "taskmaster-sync[bot]"
          git config user.email "taskmaster-sync@hamilton-erp.local"
          git checkout -b "$BRANCH"
          git add .taskmaster/tasks/tasks.json
          git commit -m "chore(taskmaster): auto-sync from docs/task_25_checklist.md" \
                     -m "Triggered by push ${TRIGGER_SHA} to main. The checklist file was modified but Taskmaster Task 25 subtask statuses lagged. This commit re-derives the JSON from the checklist (single direction: checklist → Taskmaster)." \
                     -m "See CLAUDE.md 'Plugin Data Freshness — Single Source of Truth'."
          git push -u origin "$BRANCH"
          PR_BODY="Auto-generated by .github/workflows/sync-taskmaster.yml after a push to main modified docs/task_25_checklist.md without a matching update to .taskmaster/tasks/tasks.json. Re-derives Taskmaster from the checklist (single direction).

          Triggered by: ${TRIGGER_SHA}

          Convention: see CLAUDE.md \"Plugin Data Freshness\"."
          gh pr create \
            --title "chore(taskmaster): auto-sync from checklist" \
            --body "$PR_BODY" \
            --base main \
            --head "$BRANCH" \
            --label "taskmaster-auto-sync"
          gh pr merge --squash --auto --delete-branch
