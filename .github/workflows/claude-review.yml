name: Claude PR Review

on:
  pull_request:
    types: [opened, reopened, ready_for_review]
  issue_comment:
    types: [created]

jobs:
  claude-review:
    if: ${{ github.event.sender.type != 'Bot' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          direct_prompt: |
            Review this pull request for the Hamilton ERP project (Frappe/ERPNext Python app).
            Focus on:
            1. Unnecessary or redundant code (AI fluff)
            2. Overly verbose logic that could be simplified
            3. Unused variables or imports
            4. Functions that could be condensed
            5. Any obvious bugs or logic errors
            Be concise. Flag the most important issues only.
