name: Tests

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Server Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      mariadb:
        image: mariadb:11.8
        env:
          MARIADB_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Add test_site to /etc/hosts
        run: echo "127.0.0.1 test_site" | sudo tee -a /etc/hosts

      - name: Configure git
        run: |
          git config --global init.defaultBranch main
          git config --global advice.detachedHead false

      - name: Checkout hamilton_erp
        uses: actions/checkout@v4
        with:
          path: hamilton_erp

      - name: Checkout frappe (version-16)
        uses: actions/checkout@v4
        with:
          repository: frappe/frappe
          ref: version-16
          path: frappe

      - name: Checkout erpnext (version-16)
        uses: actions/checkout@v4
        with:
          repository: frappe/erpnext
          ref: version-16
          path: erpnext

      - name: Setup Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install yarn
        run: npm install -g yarn

      - name: Install system dependencies (apt)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            mariadb-client \
            libmariadb-dev \
            libcups2-dev \
            redis-server \
            wkhtmltopdf
          # Stop the system-installed Redis — bench will run its own on
          # ports 13000 and 11000 via Procfile-managed redis-server processes.
          sudo systemctl stop redis-server || true

      - name: Install frappe-bench
        run: pip install frappe-bench

      - name: Init bench (using local frappe checkout)
        run: |
          bench init frappe-bench \
            --frappe-path "${GITHUB_WORKSPACE}/frappe" \
            --skip-assets \
            --no-backups \
            --python "$(which python)" \
            --ignore-exist

      - name: Trim Procfile for CI (drop watch + schedule)
        working-directory: frappe-bench
        run: |
          sed -i '/^watch:/d' Procfile
          sed -i '/^schedule:/d' Procfile

      - name: Add ERPNext to bench
        working-directory: frappe-bench
        run: bench get-app --skip-assets erpnext "${GITHUB_WORKSPACE}/erpnext"

      - name: Add hamilton_erp to bench
        working-directory: frappe-bench
        run: bench get-app --skip-assets hamilton_erp "${GITHUB_WORKSPACE}/hamilton_erp"

      - name: Install test-only Python deps into bench env
        working-directory: frappe-bench
        # hypothesis is imported by hamilton_erp/test_hypothesis.py for property-based
        # tests (run via `bench run-tests`). It's not a runtime app dep so it's not
        # in pyproject.toml's main dependencies. Install directly into the bench venv
        # so test discovery can import it.
        run: env/bin/pip install hypothesis

      - name: Configure bench credentials
        working-directory: frappe-bench
        run: |
          bench set-config -g root_login root
          bench set-config -g root_password root
          bench set-config -g admin_password admin

      - name: Start bench in background (for redis_cache, redis_queue, worker)
        working-directory: frappe-bench
        run: |
          bench start &> bench_start.log &
          echo "Waiting for redis_cache on port 13000..."
          for i in {1..30}; do
            if redis-cli -p 13000 ping >/dev/null 2>&1; then
              echo "redis_cache ready after ${i} attempts"
              break
            fi
            sleep 2
          done
          echo "Waiting for redis_queue on port 11000..."
          for i in {1..30}; do
            if redis-cli -p 11000 ping >/dev/null 2>&1; then
              echo "redis_queue ready after ${i} attempts"
              break
            fi
            sleep 2
          done

      - name: Create test_site (install frappe + erpnext + hamilton_erp)
        working-directory: frappe-bench
        run: |
          bench new-site test_site \
            --db-type mariadb \
            --db-host 127.0.0.1 \
            --db-port 3306 \
            --mariadb-root-password root \
            --admin-password admin \
            --no-mariadb-socket \
            --install-app erpnext \
            --install-app hamilton_erp \
            --verbose
          bench --site test_site set-config allow_tests 1 --parse
          bench --site test_site set-config server_script_enabled 1 --parse

      - name: Bootstrap minimal ERPNext root records (Customer Group + Territory)
        working-directory: frappe-bench
        # Fresh ERPNext install via `bench new-site --install-app erpnext` does
        # NOT run the setup-wizard, so root records (All Customer Groups,
        # All Territories, etc.) don't exist. Without them, our seed_hamilton_env
        # fails with LinkValidationError on the Walk-in Customer insert.
        # erpnext.setup.utils.before_tests doesn't exist at that path in v16
        # (refactored away). Cleanest CI fix: create the minimum root records
        # directly via frappe.get_doc + ignore_permissions. NestedSet auto-fills
        # lft/rgt. Idempotent guards make this safe on re-run.
        run: |
          env/bin/python <<'PY'
          import frappe
          frappe.init(site='test_site', sites_path='sites')
          frappe.connect()
          try:
              if not frappe.db.exists('Customer Group', 'All Customer Groups'):
                  frappe.get_doc({
                      'doctype': 'Customer Group',
                      'customer_group_name': 'All Customer Groups',
                      'is_group': 1,
                  }).insert(ignore_permissions=True)
              if not frappe.db.exists('Customer Group', 'Individual'):
                  frappe.get_doc({
                      'doctype': 'Customer Group',
                      'customer_group_name': 'Individual',
                      'parent_customer_group': 'All Customer Groups',
                      'is_group': 0,
                  }).insert(ignore_permissions=True)
              if not frappe.db.exists('Territory', 'All Territories'):
                  frappe.get_doc({
                      'doctype': 'Territory',
                      'territory_name': 'All Territories',
                      'is_group': 1,
                  }).insert(ignore_permissions=True)
              if not frappe.db.exists('Territory', 'Default'):
                  frappe.get_doc({
                      'doctype': 'Territory',
                      'territory_name': 'Default',
                      'parent_territory': 'All Territories',
                      'is_group': 0,
                  }).insert(ignore_permissions=True)
              frappe.db.commit()
              print('Bootstrap complete: Customer Group + Territory roots created')
          finally:
              frappe.destroy()
          PY

      - name: Seed hamilton_erp test data
        working-directory: frappe-bench
        # patches.txt registers seed_hamilton_env under [post_model_sync] but
        # bench new-site --install-app doesn't reliably trigger post-install
        # patches in fresh-DB scenarios. Call the seed explicitly so the 59
        # Venue Assets, Walk-in Customer, and Hamilton Settings defaults exist
        # before tests query them.
        run: |
          bench --site test_site execute hamilton_erp.patches.v0_1.seed_hamilton_env.execute
          bench --site test_site execute hamilton_erp.patches.v0_1.rename_glory_hole_to_gh_room.execute

      - name: Clean fresh-ERPNext desktop:home_page row (CI-only)
        working-directory: frappe-bench
        # Fresh ERPNext installs leave tabDefaultValue.desktop:home_page set to
        # "setup-wizard" which causes the asset-board flash-loop pinned by
        # test_regression_desktop_home_page_not_setup_wizard. Local dev sites
        # have this cleared; CI gets a fresh install every run, so clean it
        # here. This mirrors what the local /debug-env workflow does.
        run: |
          bench --site test_site mariadb --execute "DELETE FROM \`tabDefaultValue\` WHERE defkey='desktop:home_page' AND defvalue='setup-wizard';"

      - name: Run hamilton_erp tests
        working-directory: frappe-bench
        run: bench --site test_site run-tests --app hamilton_erp

      - name: Show bench_start.log on failure
        if: failure()
        working-directory: frappe-bench
        run: |
          echo "=== bench_start.log ==="
          cat bench_start.log || true
          echo "=== sites/test_site/logs (if any) ==="
          ls -la sites/test_site/logs/ 2>/dev/null || true
          for f in sites/test_site/logs/*.log; do
            [ -f "$f" ] || continue
            echo "--- $f ---"
            tail -50 "$f"
          done
