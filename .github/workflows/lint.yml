name: Linter

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    name: Linter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      # ruff steps are non-blocking until the existing codebase passes cleanly.
      # 89 issues remain after the W191/E101 config fix in pyproject.toml
      # (78 auto-fixable style cleanups + 11 manual review items) plus 37 files
      # needing format. Tracked as follow-up Taskmaster item; do not block PRs
      # on it for now.
      - run: ruff check .
        continue-on-error: true
      - run: ruff format --check .
        continue-on-error: true
